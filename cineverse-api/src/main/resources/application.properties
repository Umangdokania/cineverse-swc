# ── Database ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/cineverse
spring.datasource.username=${DB_USERNAME:umangdokania}
spring.datasource.password=${DB_PASSWORD:Umangumang@1}

# ── Hibernate / JPA ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.properties.hibernate.format_sql=false

# ── HikariCP connection pool ──────────────────────────────
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.maximum-pool-size=10

# ── JWT ───────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:CineverseVerySecretKeyThatIsAtLeast512BitsLongForHS512AlgorithmUsage2024!!}
app.jwt.expiration-ms=86400000

# ── Email / SMTP ──────────────────────────────────────────
# Replace these with your real SMTP credentials when hosting (e.g. Gmail, SendGrid, Mailtrap)
spring.mail.host=${SMTP_HOST:smtp.mailtrap.io}
spring.mail.port=${SMTP_PORT:2525}
spring.mail.username=${SMTP_USERNAME:mock_user}
spring.mail.password=${SMTP_PASSWORD:mock_pass}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
