server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cineverse}
    username: ${DB_USERNAME:umangdokania}
    password: ${DB_PASSWORD:Umangumang@1}
    hikari:
      keepalive-time: 30000
      connection-timeout: 20000
      validation-timeout: 3000
      connection-test-query: SELECT 1
      max-lifetime: 1800000
      idle-timeout: 600000
      maximum-pool-size: 10
      
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
        format_sql: false
        
  mail:
    host: smtp.gmail.com
    port: 587
    # IMPORTANT: Put your actual Gmail address below
    username: ${MAIL_USERNAME:project.umangdokania@gmail.com}
    # IMPORTANT: Provide the App Password via the Render Environment Variable `MAIL_PASSWORD`
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  jwt:
    secret: ${JWT_SECRET:CineverseVerySecretKeyThatIsAtLeast512BitsLongForHS512AlgorithmUsage2024!!}
    expiration-ms: 86400000
